<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to VoiceTally</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            text-align: center;
            color: #333;
        }

        h1 {
            color: #4285f4;
        }

        p {
            font-size: 1.1em;
            max-width: 600px;
            margin: 0 auto 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1em;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #357abd;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #d9534f;
        }
    </style>
</head>

<body>
    <h1>Welcome to VoiceTally!</h1>
    <p>To use voice commands seamlessly, we need your permission to access the microphone once.</p>
    <p>This allows the popup to listen immediately when you click the mic button, ensuring a smooth experience.</p>

    <button id="enableBtn">Enable Microphone Access</button>
    <div id="status"></div>

    <script src="welcome.js"></script>
</body>

</html>
