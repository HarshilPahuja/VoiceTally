<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>VoiceTally</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --success: #10B981;
      --error: #EF4444;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      width: 340px;
      margin: 0;
      padding: 20px;
      background-color: var(--bg);
      color: var(--text-main);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    .status-bar {
      font-size: 12px;
      color: var(--text-muted);
      height: 18px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex-grow: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--surface);
      color: var(--text-main);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    input[type="text"]::placeholder {
      color: #9CA3AF;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      color: white;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
      background-color: var(--primary);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    button:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    button:active {
      transform: translateY(1px);
    }

    /* Microphone Button Styles */
    #micBtn {
      background-color: var(--text-muted);
      width: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    #micBtn.listening {
      background-color: var(--error);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    #output {
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 60px;
      font-size: 13px;
      color: var(--text-muted);
      white-space: pre-wrap;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }

    .error-state {
      border-color: var(--error) !important;
      color: var(--error) !important;
      background-color: #FEF2F2 !important;
    }

    .success-state {
      border-color: var(--success) !important;
    }

    /* Table Styles */
    .result-summary {
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-main);
    }

    .result-summary b {
      font-weight: 600;
      color: var(--primary);
    }

    .result-breakdown {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .breakdown-pill {
      background: #F3F4F6;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-main);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
      text-align: left;
    }

    th {
      background-color: #F9FAFB;
      color: var(--text-muted);
      font-weight: 500;
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .table-footer {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <h2>VoiceTally</h2>
  </header>

  <div id="statusBar" class="status-bar">Ready for queries...</div>

  <div class="input-group">
    <input type="text" id="queryInput" placeholder="e.g., 'sales last week', 'pending...'" maxlength="200"
      autocomplete="off">
    <button id="micBtn" type="button" title="Speak Query">🎤</button>
    <button id="submitBtn" type="button">Ask</button>
  </div>

  <div id="output">Results will appear here...</div>

  <script src="popup.js"></script>
</body>

</html>
