<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #333; }
        ul { font-size: 14px; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p><strong>Period:</strong> {{ period }}</p>
    <hr>
    <ul>
        {% for item in points %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>
</body>
</html>
